# ──────────────────────────────────────────────────
# Exchange Configuration — AI Trading Agent
# Sustituye Binance (bloqueado HTTP 451 desde este VPS)
# por Kraken (primario) + OKX (secundario + metales)
# ──────────────────────────────────────────────────
# Verificado en vivo 2026-03-16 desde VPS srv1347416

exchanges:
  # ── Exchange primario: Kraken ──
  # Crypto spot: BTC/USDT, ETH/USDT, SOL/USDT
  # Oro tokenizado: XAUT/USDT, PAXG/USD
  kraken:
    enabled: true
    role: primary
    ccxt_id: kraken
    sandbox: false
    rate_limit: true
    assets:
      BTC:
        pair: BTC/USDT
        timeframes: [1m, 5m, 15m, 1h]
      ETH:
        pair: ETH/USDT
        timeframes: [1m, 5m, 15m, 1h]
      SOL:
        pair: SOL/USDT
        timeframes: [1m, 5m, 15m, 1h]
      AVAX:
        pair: AVAX/USDT          # Avalanche — alta volatilidad, buenas correcciones bajistas
        timeframes: [1m, 5m, 15m, 1h]
      LINK:
        pair: LINK/USDT          # Chainlink — correlación baja con BTC, buenas bajadas técnicas
        timeframes: [1m, 5m, 15m, 1h]
      # INJ: solo disponible en OKX/USDT — Kraken tiene INJ/EUR e INJ/USD únicamente
      AAVE:
        pair: AAVE/USD           # Aave DeFi — buenas correcciones técnicas profundas (Kraken no tiene AAVE/USDT)
        timeframes: [1m, 5m, 15m, 1h]
      POL:
        pair: POL/USD            # Polygon (ex-MATIC) — alta vol, buenas bajadas bajistas (Kraken no tiene POL/USDT)
        timeframes: [1m, 5m, 15m, 1h]
      XAU:
        pair: XAUT/USDT          # Tether Gold — proxy para oro físico
        timeframes: [5m, 15m, 1h]
        note: "Token respaldado 1:1 por onza troy de oro (TrueGold/Tether)"

  # ── Exchange secundario: OKX ──
  # Crypto spot: BTC/USDT, ETH/USDT, SOL/USDT
  # Oro: XAUT/USDT (spot), XAU/USD:USD (perp)
  # Plata: XAG/USDT:USDT (perp) — ÚNICO exchange accesible con plata
  okx:
    enabled: true
    role: secondary
    ccxt_id: okx
    sandbox: false
    rate_limit: true
    assets:
      BTC:
        pair: BTC/USDT
        timeframes: [1m, 5m, 15m, 1h]
      ETH:
        pair: ETH/USDT
        timeframes: [1m, 5m, 15m, 1h]
      SOL:
        pair: SOL/USDT
        timeframes: [1m, 5m, 15m, 1h]
      AVAX:
        pair: AVAX/USDT
        timeframes: [1m, 5m, 15m, 1h]
      LINK:
        pair: LINK/USDT
        timeframes: [1m, 5m, 15m, 1h]
      INJ:
        pair: INJ/USDT
        timeframes: [1m, 5m, 15m, 1h]
      AAVE:
        pair: AAVE/USDT
        timeframes: [1m, 5m, 15m, 1h]
      POL:
        pair: POL/USDT
        timeframes: [1m, 5m, 15m, 1h]
      XAU:
        pair: XAUT/USDT
        timeframes: [5m, 15m, 1h]
        alt_pair: "XAU/USD:USD"  # perpetuo — más liquidez para hedging
      XAG:
        pair: "XAG/USDT:USDT"   # contrato perpetuo
        timeframes: [15m, 1h]
        note: "Plata solo disponible como perpetuo en OKX desde este VPS"

  # ── Backup: Binance US ──
  # Solo crypto (BTC, ETH). Volumen bajo. Usar si Kraken/OKX fallan.
  binanceus:
    enabled: false               # deshabilitado por defecto
    role: backup
    ccxt_id: binanceus
    sandbox: false
    rate_limit: true
    assets:
      BTC:
        pair: BTC/USDT
        timeframes: [1m, 5m, 15m, 1h]
      ETH:
        pair: ETH/USDT
        timeframes: [1m, 5m, 15m, 1h]

# ── NOTA sobre Binance (main) ──
# api.binance.com está bloqueado desde este VPS (HTTP 451 — geo-restriction).
# Testnet spot y futures mainnet también bloqueados.
# Solo testnet.binancefuture.com y api.binance.us responden.
# Decisión: usar Kraken + OKX como reemplazo total.
# Verificado: 2026-03-16

# ── Mapeo de activos del plan ──
# Activo  | Exchange primario | Par               | Backup
# BTC     | Kraken            | BTC/USDT          | OKX
# ETH     | Kraken            | ETH/USDT          | OKX
# SOL     | Kraken            | SOL/USDT          | OKX / KuCoin
# XAU     | OKX               | XAUT/USDT         | Kraken (XAUT/USDT)
# XAG     | OKX               | XAG/USDT:USDT     | Sin alternativa spot

# ── Parámetros de riesgo (INMUTABLES en runtime) ──
risk:
  max_risk_per_trade_pct: 1.0
  max_portfolio_exposure_pct: 5.0
  stop_loss_atr_mult: 1.5
  take_profit_atr_mult: 2.5
  max_drawdown_pct: 10.0
  paper_trading: true

# ══════════════════════════════════════════════════
# POLYMARKET — Mercados de predicción (línea independiente)
# ══════════════════════════════════════════════════
polymarket:
  enabled: true
  paper_trading: true
  host: "https://clob.polymarket.com"
  chain_id: 137                    # Polygon
  initial_paper_balance: 1000.0    # USDC simulados
  scan_interval_seconds: 300       # 5 min entre scans
  # ── Filtros de mercado ──
  # Solo mercados crypto con probabilidad moderada (0.20–0.80)
  # donde nuestras señales técnicas tienen edge real.
  market_filters:
    min_volume: 30000              # USD mínimo volumen (subido de 20k — v2 diagnóstico)
    min_liquidity: 5000            # USD mínimo liquidez
    max_end_days: 14               # No apostar a más de 14 días (antes 30 — señales 1h/4h no predicen >14d)
    min_end_hours: 2               # No apostar si resuelve en <2h
    min_price_yes: 0.42            # Precio YES mínimo (subido de 0.35 — zona 0.42-0.58 tiene WR=50% EV=+$2.28 en backtest)
    max_price_yes: 0.58            # Precio YES máximo (bajado de 0.80 — zona 0.60+ tiene EV<0 en backtest)
    max_spread: 1.05               # Spread YES+NO máximo (nuevo — filtra rake >5%)
  # ── Categorías permitidas ──
  # SOLO crypto: donde nuestras señales técnicas tienen valor real.
  # Deportes/política/entretenimiento eliminados — LLM y señales no tienen edge ahí.
  categories_allowed:
    - crypto
  # ── Palabras clave obligatorias en la pregunta ──
  # Al menos una debe aparecer para evaluar el mercado.
  question_keywords:
    - BTC
    - Bitcoin
    - ETH
    - Ethereum
    - crypto
    - cryptocurrency
  # ── Parámetros de riesgo ──
  risk:
    max_position_pct: 1.5          # Max 1.5% del balance por posición (reducido de 2.5 — protege capital en validación)
    max_total_exposure_pct: 30.0   # Max 30% del balance en posiciones (reducido de 40)
    max_concurrent_positions: 3    # Max 3 posiciones (reducido de 5 — menos exposición mientras se valida edge)
    min_edge_pct: 10.0             # Edge mínimo 10% — zona 0.35-0.58 da edge 10-15% (ajustado v2)
    kelly_fraction: 0.25           # Cuarto Kelly base (dinámico: edge≥25%→0.40, ≥20%→0.30)
    early_exit_profit: 0.85        # TP fijo (poly_monitor — base)
    early_exit_loss: 0.10          # SL fijo (poly_monitor — overrideado por SL dinámico)
    sl_loss_fraction: 0.25         # SL dinámico: perder máx 25% del capital invertido (reducido de 0.40 — corta antes)
    sl_trailing_activate: 0.72     # Activar trailing TP cuando precio llega a 0.72 (nuevo v2)
    sl_trailing_step: 0.04         # Avanzar trailing cada +0.04 (nuevo v2)
    max_session_drawdown_pct: 20.0 # Circuit breaker: pausar si DD sesión > 20% (antes 50%)
    consecutive_losses_halt: 5     # Circuit breaker: haltar si N pérdidas seguidas (nuevo v2)
  # ── Configuración por estrategia ──
  strategies:
    tail_end:
      enabled: true
      min_price: 0.93              # Precio mínimo para considerar "near resolution"
      max_price: 0.985             # Precio máximo (evitar mercados ya resueltos)
      max_end_days: 7              # Días máximos hasta expiración
      min_end_hours: 1             # Horas mínimas hasta expiración
      min_return_pct: 2.0          # Retorno mínimo esperado (%)
      stop_loss_price: 0.88        # Salida si precio cae por debajo de esto
    late_entry:
      enabled: false               # DESACTIVADA v2: datos insuficientes para validar edge, zona de precio 0.70-0.79 WR=84% pero R:R<1
    legged_arb:
      enabled: false               # DESACTIVADA 2026-04-25: 0 wins en 12 trades, entra en mercados políticos
      max_phase1_price: 0.30       # Precio máximo YES para Phase 1
      min_leg2_profit_pct: 5.0     # Profit mínimo garantizado para Phase 2
      max_hold_days: 14            # Días máximos esperando Phase 2
      max_investment_per_pair: 30  # USD máximo total (ambas legs)
    combinatorial:
      enabled: false               # DESACTIVADA v2: EV=-$3.32 en 17 trades (backtest diagnóstico 2026-04-28)

# ── Trailing Dinámico (ver docs/TRAILING_DINAMICO.md) ──
trailing:
  activation_threshold_r: 1.0   # Profit mínimo en R para activar trailing
  step_size_r: 0.5              # Incremento entre escalones (en R)
  lock_offset_r: 1.0            # SL rezaga (trigger - offset)×R respecto al entry

# ══════════════════════════════════════════════════════════════════════════════
# OPTIONS — Theta Farming en Deribit (P3 del roadmap)
# Verificado accesible desde VPS srv1347416 — 2026-04-14
# ══════════════════════════════════════════════════════════════════════════════
options:
  enabled: true
  paper_trading: true             # Cambiar a false para operar en live
  exchange: deribit
  initial_paper_balance_usd: 2000.0  # Capital simulado inicial

  # ── Parámetros de estrategia (theta_farming.py) ──
  strategy:
    underlying: BTC
    option_type: PUT              # Solo PUT vendidos (cobrar prima)
    contract_size: 0.1            # BTC por contrato (mínimo Deribit)

    # DTE (días hasta expiración)
    min_dte: 3
    max_dte: 21
    target_dte_min: 5             # DTE óptimo
    target_dte_max: 10

    # Strike OTM
    min_otm_pct: 0.04             # Mínimo 4% fuera del dinero
    max_otm_pct: 0.12             # Máximo 12% fuera del dinero

    # IV Rank mínimo para vender (prima suficiente relativa al riesgo)
    min_iv_rank: 20

    # Delta máximo absoluto del PUT (probabilidad de ser ejercida)
    max_delta_abs: 0.20

    # Spread máximo como % del mark price (liquidez)
    max_spread_pct: 0.25

    # Máximo posiciones simultáneas
    max_open_positions: 3

  # ── Gestión de riesgo ──
  risk:
    max_drawdown_pct: 30.0        # Halt si drawdown supera este %
    stop_loss_multiplier: 2.0     # Stop si prima sube 2× la cobrada
    profit_lock_pct: 0.80         # Cerrar si ganamos 80% de la prima
    max_margin_usage_pct: 0.70    # Máximo 70% del balance en margen activo

  # ── Intervalos ──
  monitor_interval_seconds: 300  # Check stops cada 5 minutos
  scan_interval_seconds: 3600    # Scan nueva entrada cada 1 hora
  snapshot_interval_seconds: 3600  # Guardar IV para backtesting cada hora

# ══════════════════════════════════════════════════════════════════════════════
# GRID STABLE — Grid Bot para pares de baja volatilidad (ETH/BTC, LINK/BTC)
# Extensión del Grid Bot existente con parámetros calibrados para pares estables.
# ══════════════════════════════════════════════════════════════════════════════
grid_stable:
  enabled: true
  paper_trading: true
  initial_balance: 500.0           # Capital pequeño dedicado
  cycle_interval_seconds: 120      # Escanear cada 2 minutos (más frecuente que grid normal)
  pairs:
    ETH/BTC:
      enabled: true
      exchange: kraken
      fallback: okx
      grid_levels: 10
      grid_range_candles: 50
      min_range_pct: 0.005
      max_range_pct: 0.030
      tp_ratio: 1.20
      sl_ratio: 0.40
      min_rr: 1.50
      max_per_asset: 3
      risk_fraction: 0.30
    LINK/BTC:
      enabled: true
      exchange: kraken
      fallback: okx
      grid_levels: 8
      grid_range_candles: 50
      min_range_pct: 0.008
      max_range_pct: 0.050
      tp_ratio: 1.30
      sl_ratio: 0.50
      min_rr: 1.50
      max_per_asset: 2
      risk_fraction: 0.25
  risk:
    max_concurrent_total: 5        # Máximo trades grid stable abiertos
    max_drawdown_pct: 10.0         # Halt si DD > 10%
    cooldown_bars: 4               # Velas de espera tras SL
